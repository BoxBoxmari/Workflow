[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
exclude = [
    "^\\.venv/",
    "^build/",
]

[[tool.mypy.overrides]]
module = "tests.*"
follow_imports = "silent"

[tool.ruff]
line-length = 100
extend-exclude = [
    ".venv",
    "__pycache__",
    ".git",
    "build",
    ".agent",
    ".cursor",
    ".mypy_cache",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E203"]
